<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuratore Incentivi 01 — Rete 21</title>
<meta name="description" content="Scegli la tipologia e visualizza gli incentivi applicabili con scadenze, modalità di attivazione e compatibilità.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --r21-green:#b5bb00; --r21-green-dark:#9aa000; --r21-green-bg:#f7f9e6;
    --r21-dark:#414745; --r21-dark-2:#2d3230; --r21-gray:#6b7270; --r21-gray-light:#e8ebe9;
    --r21-red:#8a2f2f;
    --r21-bg:#fff; --r21-bg-alt:#f7f8f6; --r21-border:#e1e4e0;
    --r21-shadow:0 2px 12px rgba(65,71,69,.08); --r21-shadow-strong:0 8px 32px rgba(65,71,69,.12);
    --font:'Montserrat',Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:var(--font);color:var(--r21-dark);background:var(--r21-bg-alt);line-height:1.6;font-size:16px;-webkit-font-smoothing:antialiased}
  a{color:var(--r21-green-dark);text-decoration:underline;font-weight:600;}
  a:hover{color:var(--r21-green);}

  /* HEADER */
  .header{background:#fff;border-bottom:1px solid var(--r21-border);position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(65,71,69,.04)}
  .header-inner{max-width:1180px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;gap:16px;justify-content:space-between;flex-wrap:wrap}
  .logo{display:flex;align-items:center;gap:10px}
  .logo img{height:46px;display:block}
  .draft-badge{background:#e7f4e1;color:#2d5f30;font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;padding:6px 12px;border-radius:20px;border:1px solid var(--r21-green)}

  /* HERO */
  .hero{background:linear-gradient(135deg,var(--r21-dark) 0%,var(--r21-dark-2) 100%);color:#fff;padding:22px 24px 20px;position:relative;overflow:hidden}
  .hero::before{content:"";position:absolute;top:-50%;right:-6%;width:400px;height:400px;background:radial-gradient(circle,rgba(181,187,0,.18) 0,transparent 70%);pointer-events:none}
  .hero-inner{max-width:1180px;margin:0 auto;position:relative;z-index:1}
  .hero h1{font-size:clamp(22px,3.4vw,30px);font-weight:800;letter-spacing:-.4px;line-height:1.15}
  .hero h1 em{color:var(--r21-green);font-style:normal}

  /* TOOLBAR tipologie */
  .toolbar-wrap{background:#fff;border-bottom:1px solid var(--r21-border);position:sticky;top:71px;z-index:90;box-shadow:0 2px 8px rgba(65,71,69,.05)}
  .toolbar{max-width:1180px;margin:0 auto;padding:14px 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .type-btn{
    display:inline-flex;align-items:center;gap:8px;
    font-family:var(--font);font-weight:700;font-size:14px;
    padding:11px 18px;border-radius:8px;cursor:pointer;
    border:2px solid var(--r21-border);background:#fff;color:var(--r21-gray);
    transition:all .18s ease;white-space:nowrap;
  }
  .type-btn .ico{font-size:18px;line-height:1}
  .type-btn:hover{border-color:var(--r21-green);color:var(--r21-dark-2);background:var(--r21-green-bg)}
  .type-btn.active{background:var(--r21-green);border-color:var(--r21-green);color:#fff;box-shadow:0 3px 10px rgba(181,187,0,.35)}
  @media (max-width:640px){
    .toolbar{gap:8px;padding:12px 16px}
    .type-btn{font-size:13px;padding:9px 13px;flex:1 1 auto;justify-content:center}
    .toolbar-wrap{top:65px}
  }

  /* LAYOUT */
  .wrap{max-width:1180px;margin:24px auto 50px;padding:0 24px}
  @media (max-width:880px){.wrap{padding:0 16px}}
  .col-main{min-width:0}
  
  /* CARDS */
  .inc-card{background:#fff;border:2px solid var(--r21-border);border-radius:12px;box-shadow:var(--r21-shadow);margin-bottom:14px;overflow:hidden;animation:fade .3s ease both;transition:border-color .18s ease,opacity .18s ease,box-shadow .18s ease}
  .inc-head{display:flex;align-items:center;gap:13px;padding:13px 16px;cursor:default;user-select:none;background:#fff;border-bottom:1px solid var(--r21-border);transition:background .18s ease}
  
  .inc-letter{flex-shrink:0;width:36px;height:36px;border-radius:9px;background:#fff;border:2px solid var(--r21-green);color:var(--r21-green-dark);font-size:17px;font-weight:800;display:flex;align-items:center;justify-content:center;transition:all .18s ease; cursor:pointer;}
  .inc-letter:hover{background:var(--r21-green-bg);}
  
  .inc-titlewrap{flex:1;min-width:0}
  .inc-name{font-size:15px;font-weight:800;color:var(--r21-dark-2);text-transform:uppercase;letter-spacing:.3px;line-height:1.25}
  .inc-cat{font-size:11px;font-weight:600;color:var(--r21-gray);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
  .inc-pick{flex-shrink:0;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--r21-gray);border:1.5px solid var(--r21-border);border-radius:20px;padding:5px 11px;white-space:nowrap}
  .inc-pick:empty{display:none}

  /* BARRA COMPATIBILITÀ */
  .compat-host{max-width:1180px;margin:0 auto}
  .compat-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:11px 24px;border-top:1px solid var(--r21-border)}
  .compat-prompt{font-size:13px;color:var(--r21-dark);font-weight:600}
  .compat-letters{display:flex;gap:7px;flex-wrap:wrap}
  .cl-btn{width:34px;height:34px;border-radius:8px;border:2px solid var(--r21-green);background:#fff;color:var(--r21-green-dark);font-weight:800;font-size:15px;cursor:pointer;font-family:var(--font);transition:all .15s;display:flex;align-items:center;justify-content:center;padding:0}
  .cl-btn:hover{background:var(--r21-green-bg)}
  .cl-btn.active{background:var(--r21-green);color:#fff;box-shadow:0 3px 10px rgba(181,187,0,.35)}
  
  .cl-btn.incompat{background:var(--r21-red);border-color:var(--r21-red);color:#fff;}
  .cl-btn.incompat:hover{background:#a33737;border-color:#a33737;}

  .compat-clear{margin-left:auto;font-family:var(--font);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.4px;padding:7px 14px;border:2px solid var(--r21-green);background:#fff;color:var(--r21-green-dark);border-radius:7px;cursor:pointer}
  .compat-clear:hover{background:var(--r21-green);color:#fff}
  @media (max-width:640px){ .compat-bar{padding:10px 16px} .compat-prompt{width:100%} }

  /* COLONNE NUMERATE */
  .cols4{display:grid;grid-template-columns:1.6fr .85fr 1.25fr 1.3fr;gap:0}
  .col{padding:14px 16px;border-left:1px solid var(--r21-border)}
  .col:first-child{border-left:none}
  .col-label{font-size:11px;font-weight:800;color:var(--r21-dark-2);text-transform:uppercase;letter-spacing:.4px;display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .col-num{flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:7px;background:#eef1f4;border:1px solid #dde3e8;color:var(--r21-dark-2);font-size:12px;font-weight:800}
  .col-body{font-size:13px;color:var(--r21-dark);line-height:1.55}
  .col-body strong{color:var(--r21-dark-2)}
  @media (max-width:900px){
    .cols4{grid-template-columns:1fr 1fr}
    .col{border-left:none;border-top:1px solid var(--r21-border)}
    .col:first-child,.col:nth-child(2){border-top:none}
  }
  @media (max-width:560px){
    .cols4{grid-template-columns:1fr}
    .col{border-top:1px solid var(--r21-border)}
    .col:first-child{border-top:none}
  }

  /* STATI SCHEDE (Compatibili / Incompatibili) */
  .inc-list.has-sel .inc-card.sel,
  .inc-list.has-sel .inc-card.compat { border-color: var(--r21-green); box-shadow: 0 4px 16px rgba(181,187,0,.15); }
  .inc-list.has-sel .inc-card.sel .inc-head,
  .inc-list.has-sel .inc-card.compat .inc-head { background: var(--r21-green-bg); border-bottom: 1px solid var(--r21-green); }
  
  .inc-list.has-sel .inc-card.sel .inc-letter,
  .inc-list.has-sel .inc-card.compat .inc-letter { background: var(--r21-green); color: #fff; border-color: var(--r21-green); }
  .inc-list.has-sel .inc-card.sel .inc-pick,
  .inc-list.has-sel .inc-card.compat .inc-pick { background: var(--r21-green); color: #fff; border-color: var(--r21-green); }

  .inc-list.has-sel .inc-card:not(.sel):not(.compat) { opacity: 1; border-color: var(--r21-border); }
  .inc-list.has-sel .inc-card:not(.sel):not(.compat) .inc-letter { background: var(--r21-red); color: #fff; border-color: var(--r21-red); }
  .inc-list.has-sel .inc-card:not(.sel):not(.compat) .inc-pick { border-color: var(--r21-red); color: var(--r21-red); background: #fff; }

  /* CARD AMMINISTRATORE: ruolo gestionale, fuori dai filtri di compatibilità */
  .admin-card{border-left:4px solid var(--r21-green)}
  .admin-card .inc-head{background:var(--r21-green-bg)}
  .admin-card .inc-letter{cursor:default}
  .admin-card .inc-letter:hover{background:#fff}
  .inc-list.has-sel .inc-card.admin-card{opacity:1;border-color:var(--r21-border);border-left-color:var(--r21-green)}
  .inc-list.has-sel .inc-card.admin-card .inc-head{background:var(--r21-green-bg);border-bottom:1px solid var(--r21-border)}
  .inc-list.has-sel .inc-card.admin-card .inc-letter{background:#fff;color:var(--r21-green-dark);border-color:var(--r21-green)}

  /* SCADENZE BADGES */
  .scad-urg{background:#fbd5d5;color:#912727}
  .scad-breve{background:#ffe0b2;color:#7a4100}
  .scad-strut{background:#d6ecd8;color:#2d5f30}
  .scad-cont{background:var(--r21-green-bg);color:var(--r21-green-dark)}
  .scad-ver{background:#d9e9ff;color:#1b4b85}

  .footer{background:var(--r21-dark-2);color:#c8ccc9;padding:26px 24px;text-align:center;font-size:12px}
  .footer a{color:var(--r21-green)}
  .disclaimer{max-width:1180px;margin:0 auto 0;padding:16px 24px;font-size:12px;color:var(--r21-gray);font-style:italic;line-height:1.55}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

/* ====== MAPPA COMPATIBILITÀ ====== */
const INCOMPAT = {
  casa:      [[7],[7],[3,4],[2],[2],[],[],[0,1]],
  condo:     [[3],[2],[1],[0]],
  azienda:   [[],[2],[1],[]],
  hotel:     [[],[],[]],
  complesso: [[],[],[]],
  campofv:   [[1,3],[0,3],[],[0,1],[]]
};

let CUR_TIPO = 'casa';
let CUR_SEL = null;

function render(tipoKey){
  CUR_TIPO = tipoKey; CUR_SEL = null;
  const t = TIPI[tipoKey]; const ch = document.getElementById('compat-host');
  
  let letters='';
  t.inc.forEach((i,idx)=>{ letters += '<button class="cl-btn" id="cl-'+idx+'" onclick="selectInc('+idx+')" title="Filtra compatibilità per '+i.nome+'">'+String.fromCharCode(65+idx)+'</button>'; });
  
  if(ch) ch.innerHTML =
    '<div class="compat-bar">'+
      '<span class="compat-prompt">Filtra per riga:</span>'+
      '<div class="compat-letters">'+letters+'</div>'+
      '<span class="compat-prompt">- Le righe evidenziate hanno gli incentivi compatibili</span>'+
      '<button class="compat-clear" id="compat-clear" onclick="clearSel()" style="display:none">MOSTRA TUTTI</button>'+
    '</div>';

  let html = '<div class="inc-list" id="inc-list-inner">';
  let counter = 0;
  t.inc.forEach((i, idx)=>{
    const letter = String.fromCharCode(65 + idx);
    const cols = [
      {label:'Descrizione', body:i.desc},
      {label:'Scadenza', body:'<span class="scad '+scadClass[i.sc]+'">'+i.scad+'</span>'},
      {label:'Come, Quando, Perché', body:i.att},
      {label:'Compatibilità / Attenzione', body:i.comp}
    ];
    let colsHtml = '';
    cols.forEach(c=>{
      counter++;
      colsHtml += '<div class="col"><div class="col-label"><span class="col-num">'+counter+'</span>'+c.label+'</div><div class="col-body">'+c.body+'</div></div>';
    });
    
    html +=
      '<div class="inc-card" id="card-'+idx+'">'+
        '<div class="inc-head">'+
          '<span class="inc-letter" onclick="selectInc('+idx+')" title="Filtra compatibilità per '+i.nome+'">'+letter+'</span>'+
          '<div class="inc-titlewrap"><div class="inc-name">'+i.nome+'</div><div class="inc-cat">'+i.cat+'</div></div>'+
          '<span class="inc-pick" id="pick-'+idx+'"></span>'+
        '</div><div class="cols4">'+colsHtml+'</div></div>';
  });

  if(t.admin){
    const aLetter = String.fromCharCode(65 + t.inc.length);
    let aCols='';
    t.admin.sezioni.forEach(sz=>{
      counter++;
      aCols += '<div class="col"><div class="col-label"><span class="col-num">'+counter+'</span>'+sz.label+'</div><div class="col-body">'+sz.body+'</div></div>';
    });
    html +=
      '<div class="inc-card admin-card" id="card-admin">'+
        '<div class="inc-head">'+
          '<span class="inc-letter">'+aLetter+'</span>'+
          '<div class="inc-titlewrap"><div class="inc-name">'+t.admin.nome+'</div><div class="inc-cat">'+t.admin.cat+'</div></div>'+
        '</div><div class="cols4">'+aCols+'</div></div>';
  }

  html += '</div>';
  document.getElementById('inc-list').innerHTML = html;
}

function compatList(tipo, idx){
  const n = TIPI[tipo].inc.length;
  const bad = (INCOMPAT[tipo] && INCOMPAT[tipo][idx]) ? INCOMPAT[tipo][idx] : [];
  const out = [];
  for(let k=0;k<n;k++){ if(k!==idx && bad.indexOf(k)===-1) out.push(k); }
  return out;
}

function clearAllStates(){
  document.querySelectorAll('.inc-card').forEach(c=>c.classList.remove('sel','compat'));
  document.querySelectorAll('.inc-pick').forEach(p=>p.textContent='');
  document.querySelectorAll('.cl-btn').forEach(b=>b.classList.remove('incompat'));
  const list=document.getElementById('inc-list-inner'); if(list) list.classList.remove('has-sel');
}

function selectInc(idx){
  if(CUR_SEL===idx){ clearSel(); return; }
  CUR_SEL=idx; clearAllStates();
  const list=document.getElementById('inc-list-inner'); if(list) list.classList.add('has-sel');
  document.querySelectorAll('.cl-btn').forEach(b=>b.classList.remove('active', 'incompat'));
  document.getElementById('cl-'+idx).classList.add('active');
  document.getElementById('compat-clear').style.display='';
  
  document.getElementById('card-'+idx).classList.add('sel');
  document.getElementById('pick-'+idx).textContent='SELEZIONATO';
  
  const comp=compatList(CUR_TIPO, idx);
  comp.forEach(k=>{
    document.getElementById('card-'+k).classList.add('compat');
    document.getElementById('pick-'+k).textContent='COMBINABILE NEL PROGETTO';
  });
  TIPI[CUR_TIPO].inc.forEach((x,k)=>{
    if(k!==idx && comp.indexOf(k)===-1) {
      document.getElementById('pick-'+k).textContent='INCOMPATIBILE';
      document.getElementById('cl-'+k).classList.add('incompat');
    }
  });
}

function clearSel(){
  CUR_SEL=null; clearAllStates();
  document.querySelectorAll('.cl-btn').forEach(b=>b.classList.remove('active', 'incompat'));
  document.getElementById('compat-clear').style.display='none';
}

function selectTipo(key, btn){
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  render(key); window.scrollTo({top:0, behavior:'smooth'});
}

const scadClass = {urg:'scad-urg', breve:'scad-breve', strut:'scad-strut', cont:'scad-cont', ver:'scad-ver'};
render('casa');
</script>
