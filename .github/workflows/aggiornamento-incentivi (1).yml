name: Aggiornamento Incentivi — IN PAUSA

# ============================================================
#  WORKFLOW IN PAUSA — aggiornamento automatico DISATTIVATO
#
#  Il configuratore ora è focalizzato sulle ATTIVITÀ per
#  tipologia di edificio (Casa, Condominio, Azienda, Hotel,
#  Multiproprietà, Campo FV), non sull'aggiornamento in tempo
#  reale di leggi e scadenze.
#
#  L'aggiornamento normativo verrà RICOSTRUITO insieme alla
#  futura sezione "Legislazione e Scadenze".
#
#  La pianificazione giornaliera (cron) è stata RIMOSSA: questo
#  workflow non parte più da solo. Resta solo l'avvio manuale.
#  La logica AI precedente (chiamata API + commit update.json)
#  resta disponibile nella CRONOLOGIA GIT del repository, da cui
#  potrà essere recuperata in fase di ricostruzione.
# ============================================================

on:
  workflow_dispatch:   # solo avvio manuale dalla tab Actions; nessuna esecuzione automatica

jobs:
  pausa:
    runs-on: ubuntu-latest
    steps:
      - name: Aggiornamento in pausa
        run: echo "Aggiornamento automatico DISATTIVATO. Verrà riattivato con la sezione 'Legislazione e Scadenze'."
